name: 🎲 Build Ludo Master Pro APK

on:
  push:
    branches: [main, master]
    tags:     ['v*.*.*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'

# ─────────────────────────────────────────────────────────────
jobs:

  # ══════════════════════════════════════════════════════════
  #  JOB 1 — Lint
  # ══════════════════════════════════════════════════════════
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ☕ Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - run: chmod +x gradlew

      - name: 🧹 Lint debug
        run: ./gradlew lintDebug --no-daemon

      - name: 📤 Rapport lint
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

  # ══════════════════════════════════════════════════════════
  #  JOB 2 — Tests unitaires
  # ══════════════════════════════════════════════════════════
  test:
    name: 🧪 Tests unitaires
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - run: chmod +x gradlew

      - name: 🧪 Unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: 📤 Résultats tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/
          retention-days: 7

  # ══════════════════════════════════════════════════════════
  #  JOB 3 — Build + Signature éphémère (SANS keystore)
  # ══════════════════════════════════════════════════════════
  build:
    name: 🔨 Build & Sign APK
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always() && !cancelled()

    outputs:
      apk-name:    ${{ steps.meta.outputs.apk_name }}
      apk-size:    ${{ steps.meta.outputs.apk_size }}
      version:     ${{ steps.meta.outputs.version }}

    steps:
      # ── 1. Sources ────────────────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Java & SDK ─────────────────────────────────────
      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      # ── 3. Infos de version ───────────────────────────────
      - name: 📋 Infos version
        id: meta
        run: |
          # versionName depuis le tag ou fallback
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev.${{ github.run_number }}"
          fi
          echo "VERSION_NAME=$VERSION"             >> $GITHUB_ENV
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV
          echo "version=$VERSION"                  >> $GITHUB_OUTPUT

          APK_NAME="LudoMasterPro-v${VERSION}-build${{ github.run_number }}.apk"
          echo "APK_NAME=$APK_NAME"   >> $GITHUB_ENV
          echo "apk_name=$APK_NAME"   >> $GITHUB_OUTPUT

      # ── 4. Cache Gradle ───────────────────────────────────
      - name: 🗄️ Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - run: chmod +x gradlew

      # ── 5. Build APK non signé ────────────────────────────
      - name: 🔨 Build APK (non signé)
        run: |
          ./gradlew assembleRelease \
            --no-daemon --stacktrace \
            -PversionCode=${{ env.VERSION_CODE }} \
            -PversionName=${{ env.VERSION_NAME }} \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"
        env:
          VERSION_CODE: ${{ env.VERSION_CODE }}
          VERSION_NAME: ${{ env.VERSION_NAME }}

      # ── 6. Localiser l'APK produit ────────────────────────
      - name: 📦 Localiser APK
        id: locate
        run: |
          APK_SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK_SRC=$APK_SRC" >> $GITHUB_ENV
          echo "src=$APK_SRC"     >> $GITHUB_OUTPUT
          echo "APK trouvé : $APK_SRC"

      # ── 7. Génération d'une clé éphémère + signature ──────
      #       (clé RSA 2048 bits créée dans le runner,
      #        elle n'existe QUE le temps du job et n'est
      #        stockée nulle part — zéro secret à gérer)
      - name: 🔐 Générer clé éphémère & signer l'APK
        run: |
          # ─ Générer une paire de clés RSA éphémère ─────────
          openssl genrsa -out ephemeral.pem 2048

          # ─ Certificat auto-signé (valable 10 000 jours) ───
          openssl req -new -x509 \
            -key ephemeral.pem \
            -out ephemeral.crt \
            -days 10000 \
            -subj "/CN=LudoMasterPro/O=CI Build/C=FR"

          # ─ Convertir en PKCS#12 (format attendu par apksigner)
          openssl pkcs12 -export \
            -inkey ephemeral.pem \
            -in    ephemeral.crt \
            -out   ephemeral.p12 \
            -name  "ephemeral" \
            -passout pass:ephemeral123

          # ─ Aligner l'APK (zipalign) ────────────────────────
          ZIPALIGN=$(find $ANDROID_SDK_ROOT/build-tools -name "zipalign" | sort -V | tail -1)
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name "apksigner" | sort -V | tail -1)

          "$ZIPALIGN" -v 4 "${{ env.APK_SRC }}" apk-aligned.apk

          # ─ Signer avec apksigner ───────────────────────────
          "$APKSIGNER" sign \
            --ks            ephemeral.p12 \
            --ks-type       PKCS12 \
            --ks-pass       pass:ephemeral123 \
            --key-pass      pass:ephemeral123 \
            --ks-key-alias  ephemeral \
            --out           "${{ env.APK_NAME }}" \
            apk-aligned.apk

          # ─ Vérifier la signature ───────────────────────────
          "$APKSIGNER" verify --verbose "${{ env.APK_NAME }}"

          # ─ Nettoyer les artefacts sensibles ────────────────
          rm -f ephemeral.pem ephemeral.crt ephemeral.p12

          # ─ Infos finales ───────────────────────────────────
          SIZE=$(du -sh "${{ env.APK_NAME }}" | cut -f1)
          echo "apk_size=$SIZE" >> $GITHUB_OUTPUT
          echo "✅ APK signé : ${{ env.APK_NAME }} ($SIZE)"

      # ── 8. Vérification APK (aapt) ────────────────────────
      - name: 🔎 Vérifier l'APK
        run: |
          AAPT=$(find $ANDROID_SDK_ROOT/build-tools -name "aapt2" | sort -V | tail -1)
          "$AAPT" dump badging "${{ env.APK_NAME }}" | grep -E "package:|version|application-label"

      # ── 9. Upload artifact ────────────────────────────────
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name:             ${{ env.APK_NAME }}
          path:             ${{ env.APK_NAME }}
          retention-days:   30
          compression-level: 6

      # ── 10. GitHub Release (sur tag v*) ───────────────────
      - name: 🚀 GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "🎲 Ludo Master Pro ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          body: |
            ## 🎲 Ludo Master Pro ${{ github.ref_name }}

            > Jeu de Ludo natif Android — **Kotlin · Jetpack Compose · Canvas**

            ---

            ### 📱 Installation
            1. ⬇️ Téléchargez l'APK ci-dessous
            2. ⚙️ **Paramètres → Apps → Accès spéciaux → Sources inconnues** → activer
            3. 📲 Ouvrez le fichier `.apk` et installez

            > ℹ️ L'APK est signé avec une **clé éphémère auto-générée** par le CI.
            > Cela suffit pour installer l'app en dehors du Play Store.

            ---

            ### ✨ Fonctionnalités
            - 👥 2 à 4 joueurs (Humains & IA)
            - 🤖 3 niveaux d'IA : Facile · Normal · Expert
            - 🎨 Plateau Canvas natif 60fps
            - 🎲 Dé animé + retour haptique
            - 🏆 Podium animé + statistiques
            - 💾 Records sauvegardés (DataStore)
            - 📐 Portrait & Paysage automatique

            ---

            ### 📊 Build
            | Paramètre | Valeur |
            |-----------|--------|
            | Version   | ${{ steps.meta.outputs.version }} |
            | Build n°  | ${{ github.run_number }} |
            | Taille APK| ${{ steps.locate.outputs.apk_size }} |
            | minSdk    | 24 (Android 7.0+) |
            | Signature | Clé éphémère CI (RSA 2048) |
            | Commit    | `${{ github.sha }}` |

          files: ${{ env.APK_NAME }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 11. Résumé ────────────────────────────────────────
      - name: 📊 Résumé du build
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 🎲 Ludo Master Pro — Build ${{ github.run_number }}

          | | |
          |-|-|
          | ✅ APK | \`${{ env.APK_NAME }}\` |
          | 📦 Taille | ${{ steps.locate.outputs.apk_size }} |
          | 🔖 Version | ${{ steps.meta.outputs.version }} |
          | 🔐 Signature | Clé éphémère RSA 2048 (auto-générée) |
          | 🌿 Branche | \`${{ github.ref_name }}\` |
          | 📝 Commit | \`${{ github.sha }}\` |

          > ⬇️ Téléchargez l'APK dans l'onglet **Artifacts**.
          EOF

  # ══════════════════════════════════════════════════════════
  #  JOB 4 — Notification Slack (optionnel)
  # ══════════════════════════════════════════════════════════
  notify:
    name: 📣 Notification
    runs-on: ubuntu-latest
    needs: build
    if: always() && vars.SLACK_ENABLED == 'true'
    steps:
      - uses: 8398a7/action-slack@v3
        with:
          status: ${{ needs.build.result }}
          text: |
            🎲 *Ludo Master Pro* — ${{ needs.build.result == 'success' && '✅ Build réussi' || '❌ Build échoué' }}
            APK : `${{ needs.build.outputs.apk-name }}` (${{ needs.build.outputs.apk-size }})
            Version : ${{ needs.build.outputs.version }} · Run #${{ github.run_number }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
